name: Release

# Tetiklenme:
#   - Tag push: `git tag v0.1.1 && git push origin v0.1.1` → otomatik release
#   - Manuel:  Actions sekmesinden "Run workflow" tıkla
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (örn. v0.1.1)'
        required: true
        default: 'v0.1.0-test'

jobs:
  build:
    name: ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS (Apple Silicon)
            os: macos-latest
            triple: aarch64-apple-darwin
            pkg_target: node18-macos-arm64
            tauri_args: '--target aarch64-apple-darwin'
          - label: macOS (Intel)
            os: macos-13
            triple: x86_64-apple-darwin
            pkg_target: node18-macos-x64
            tauri_args: '--target x86_64-apple-darwin'
          - label: Windows
            os: windows-latest
            triple: x86_64-pc-windows-msvc
            pkg_target: node18-win-x64
            tauri_args: ''
          - label: Linux
            os: ubuntu-22.04
            triple: x86_64-unknown-linux-gnu
            pkg_target: node18-linux-x64
            tauri_args: ''

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.triple }}

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            src-tauri/target
          key: ${{ matrix.os }}-cargo-${{ hashFiles('src-tauri/Cargo.lock') }}
          restore-keys: ${{ matrix.os }}-cargo-

      # Linux için sistem paketleri (webkit2gtk vb.)
      - name: Install Linux system deps
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install root deps
        run: npm ci

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      # backend/.env'i secrets'tan oluştur (Tauri bundle resource olarak içine alıyor)
      - name: Create backend/.env
        shell: bash
        run: |
          cat > backend/.env << EOF
          PORT=4000
          NODE_ENV=production
          SUPABASE_URL=${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_ACCESS_TOKEN=${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PUPPETEER_HEADLESS=true
          EOF

      - name: Compile backend (TypeScript)
        working-directory: backend
        run: npm run build

      - name: Package backend as sidecar binary
        shell: bash
        run: |
          npx -y @yao-pkg/pkg backend/dist/index.js \
            --targets ${{ matrix.pkg_target }} \
            --output src-tauri/binaries/backend-${{ matrix.triple }} \
            --compress GZip

      # Mac/Linux'ta sidecar executable olmalı
      - name: chmod sidecar (Unix)
        if: matrix.os != 'windows-latest'
        run: chmod +x src-tauri/binaries/backend-${{ matrix.triple }}

      - name: Build Tauri bundle
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: 'LeadPin ${{ github.event.inputs.tag || github.ref_name }}'
          releaseBody: |
            ## Kurulum

            - **Windows:** `LeadPin_*_x64-setup.exe` indir ve çalıştır
            - **macOS (M1/M2/M3):** `LeadPin_*_aarch64.dmg` indir
            - **macOS (Intel):** `LeadPin_*_x64.dmg` indir
              - İlk açılışta sağ tık → **Aç** (imzasız bundle)
            - **Linux:** `.deb` (Ubuntu/Debian) veya `.AppImage` (taşınabilir)
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.tauri_args }}
